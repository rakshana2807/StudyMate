<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>StudyMate Dictionary</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="dictionary.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<!-- Skip link for keyboard users -->
<a href="#mainContent" class="skip-link">Skip to main content</a>

<!-- Hamburger menu button (visible on mobile/tablet only) -->
<button id="hamburgerBtn" class="hamburger-btn" type="button"
    aria-label="Toggle sidebar menu" aria-expanded="false" aria-controls="sidebar">
    <span></span>
    <span></span>
    <span></span>
</button>

<!-- Dark overlay behind the sidebar on mobile/tablet -->
<div id="overlay" class="overlay" aria-hidden="true"></div>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar" id="sidebar">

        <h1 class="logo">StudyMate</h1>

        <div class="profile">

            <img src="profile.jpg" alt="Profile">

            <h3>Rakshana</h3>

        </div>

        <nav aria-label="Primary">

            <ul>

                <li>
                    <a href="index.html">
                        <i class="fa-solid fa-house"></i>
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="note.html">
                        <i class="fa-solid fa-note-sticky"></i>
                        Notes
                    </a>
                </li>

                <li>
                    <a href="tasks.html">
                        <i class="fa-solid fa-list-check"></i>
                        Tasks
                    </a>
                </li>

                <li class="active">
                    <a href="dictionary.html">
                        <i class="fa-solid fa-book"></i>
                        Dictionary
                    </a>
                </li>

                <li>
                    <a href="calender.html">
                        <i class="fa-solid fa-calendar-days"></i>
                        Calendar
                    </a>
                </li>

                <li>
                    <a href="settings.html">
                        <i class="fa-solid fa-gear"></i>
                        Settings
                    </a>
                </li>

            </ul>

        </nav>

        <!-- Theme Toggle -->
        <button id="themeToggleBtn" class="theme-toggle-btn" type="button" aria-pressed="false">
            <i class="fa-solid fa-moon"></i>
            <span>Dark Mode</span>
        </button>

    </aside>

    <!-- Main -->

    <main class="main" id="mainContent">

        <header>

            <div>

                <h2>📖 Dictionary</h2>

                <p>Search meanings, pronunciation and examples.</p>

            </div>

        </header>

        <div class="search-container">

            <!-- Search Box -->

            <div class="search-box" role="search">

                <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>

                <label for="wordInput" class="sr-only">Search any English word</label>

                <input
                    type="text"
                    id="wordInput"
                    placeholder="Search any English word..."
                    autocomplete="off">

                <button id="searchBtn" class="search-btn" type="button">
                    Search
                </button>

            </div>

        </div>

        <!-- Dictionary Result -->

        <div class="result-card">

            <div class="word-row">

                <h2 id="word" class="word">
                    Welcome 👋
                </h2>

                <button id="pronounceBtn" class="icon-btn" type="button" aria-label="Pronounce word">
                    <i class="fa-solid fa-volume-high"></i>
                </button>

                <button id="copyBtn" class="icon-btn" type="button" aria-label="Copy word">
                    <i class="fa-solid fa-copy"></i>
                </button>

            </div>

            <p id="phonetic" class="phonetic">
                Search a word to begin.
            </p>

            <h4 id="partOfSpeech" class="part-of-speech"></h4>

            <p id="meaning" class="meaning">
                Enter any English word in the search box above.
            </p>

            <p id="example" class="example">
            </p>

            <button id="saveWord" class="save-btn" type="button">
                <i class="fa-solid fa-star"></i>
                Save Word
            </button>

        </div>

        <!-- Saved Words -->

        <div class="saved-card">

            <div class="saved-header">

                <h3>⭐ Saved Words</h3>

                <button id="clearWords" class="clear-btn" type="button">
                    Clear All
                </button>

            </div>

            <ul id="savedWordsList" class="saved-list">

                <li>No saved words.</li>

            </ul>

        </div>

    </main>

</div>

<div id="toast" class="toast"></div>

<script src="sidebar.js"></script>
<script src="dictionary.js"></script>
</body>


</html>
